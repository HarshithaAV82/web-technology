<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form>
      <div>
        <h1>Registration Form</h1>
      </div>
      <br />
      <div>
        <i>name</i>
        <span>*</span>
        <span>:</span>
        <input type="text" name="nameOfStudent" id="studentId" required />
      </div>
      <br />
      <div>
        <i>email</i>
        <span>*</span>
        <span>:</span>
        <input type="email" name="emailOfStudent" id="emailId" required />
      </div>
      <br />
      <div>
        <i>passward</i>
        <span>*</span>
        <span>:</span>
        <input type="password" name="passward" id="passwarID" required />
      </div>
      <br />
      <div>
        <i>phoneNumber</i>
        <span>*</span>
        <span>:</span>
        <input type="tel" name="number" id="telId" required />
      </div>
      <br />
      <div>
        <i>Portfolio link</i>
        <span>*</span>
        <span>:</span>
        <input type="url" name="url" id="urlId" required />
      </div>
      <br />
      <div>
        <i>Quiz skill Level</i>
        <span>*</span>
        <span>:</span>
        <input type="range" name="range" id="rangeId" required />
      </div>
      <br />
      <div>
        <i>Upload photo</i>
        <span>:</span>
        <input type="file" name="photo" id="photoId" required />
      </div>
      <br />
      <div>
        <i>Serach Courses</i>
        <span>:</span>
        <input type="search" name="coursesSearch" id="coursesId" required />
      </div>
      <br />
      <div>
        <i>reset</i>
        <span>:</span>
        <input type="reset" name="resetDetatils" id="resetId" required />
      </div>
      <br />
    </form>
  </body>
</html>
