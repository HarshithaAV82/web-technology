<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Landing Page Registration</title>
  </head>

  <body>
    <h2>Simple Landing Page Registration</h2>
    <p>Please register to get updates.</p>

    <form>
      <div>
        <h1>Registration Form</h1>
      </div>

      <div>
        <i>Name</i>
        <span>*</span>
        <span>:</span>
        <input type="text" name="name" id="nameId" required />
      </div>
      <br />

      <div>
        <i>Email</i>
        <span>*</span>
        <span>:</span>
        <input type="email" name="email" id="emailId" required />
      </div>
      <br />

      <div>
        <i>Password</i>
        <span>*</span>
        <span>:</span>
        <input type="password" name="password" id="passwordId" required />
      </div>
      <br />

      <div>
        <i>Phone Number</i>
        <span>:</span>
        <input type="tel" name="phone" id="phoneId" />
      </div>
      <br />

      <div>
        <i>Date of Birth</i>
        <span>:</span>
        <input type="date" name="dob" id="dobId" />
      </div>
      <br />

      <div>
        <i>Choose Theme Color</i>
        <span>:</span>
        <input type="color" name="color" id="colorId" />
      </div>
      <br />

      <div>
        <input type="submit" name="Register" />
        <input type="reset" name="Cancel" />
      </div>
    </form>
  </body>
</html>
