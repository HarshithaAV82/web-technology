<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Registration</title>
  </head>

  <body>
    <h2>Portfolio Registration Form</h2>
    <p>Please fill the portfolio details.</p>

    <form>
      <div>
        <h1>Portfolio Form</h1>
      </div>

      <div>
        <i>Name</i>
        <span>*</span>
        <span>:</span>
        <input type="text" name="name" id="nameId" required />
      </div>

      <br />

      <div>
        <i>Email</i>
        <span>*</span>
        <span>:</span>
        <input type="email" name="email" id="emailId" required />
      </div>

      <br />

      <div>
        <i>Password</i>
        <span>*</span>
        <span>:</span>
        <input type="password" name="password" id="passwordId" required />
      </div>

      <br />

      <div>
        <i>Phone Number</i>
        <span>:</span>
        <input type="tel" name="phone" id="phoneId" />
      </div>

      <br />

      <div>
        <i>Portfolio Website</i>
        <span>:</span>
        <input type="url" name="portfolio" id="portfolioId" />
      </div>

      <br />

      <div>
        <i>Date of Birth</i>
        <span>:</span>
        <input type="date" name="dob" id="dobId" />
      </div>

      <br />

      <div>
        <i>Available Time</i>
        <span>:</span>
        <input type="time" name="time" id="timeId" />
      </div>

      <br />

      <div>
        <i>Available Week</i>
        <span>:</span>
        <input type="week" name="week" id="weekId" />
      </div>

      <br />

      <div>
        <i>Choose Theme Color</i>
        <span>:</span>
        <input type="color" name="color" id="colorId" />
      </div>

      <br />

      <div>
        <i>Upload Resume</i>
        <span>:</span>
        <input type="file" name="resume" id="resumeId" />
      </div>

      <br />

      <div>
        <i>Experience Level</i>
        <span>:</span>
        <input type="range" name="experience" min="1" max="10" />
      </div>

      <br />

      <div>
        <i>Search Skill</i>
        <span>:</span>
        <input type="search" name="skillSearch" />
      </div>

      <br />

      <div>
        <input type="submit" value="Submit" />
        <input type="reset" value="Cancel" />
      </div>
    </form>
  </body>
</html>
